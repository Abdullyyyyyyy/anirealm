<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>History - AniRealm</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
  <div class="nav-brand">AniRealm</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/journal">Journal</a>
    <a href="/history">History</a>
    <a href="/watchlist">Watchlist</a>
    <a href="/mood">Mood</a>
    <a href="/clash">Clash</a>
    <a href="/leaderboard">Leaderboard</a>
    <a href="/feed">Feed</a>
    <a href="/about">About</a>
    {% if current_user.is_authenticated %}
      <a href="/profile">Profile</a>
      <a href="/logout" class="nav-btn">Logout</a>
    {% else %}
      <a href="/login">Login</a>
      <a href="/signup" class="nav-btn">Sign Up</a>
    {% endif %}
  </div>
</nav>

  <main class="container page-space">

    <div class="card">
      <h2>Search & Filter</h2>
      <label for="searchTitle">Search by Anime Title</label>
      <input id="searchTitle" type="text" placeholder="e.g. Naruto" />

      <label for="filterSentiment">Filter by VADER Sentiment</label>
      <select id="filterSentiment">
        <option value="">All Sentiments</option>
        <option value="Positive">Positive</option>
        <option value="Neutral">Neutral</option>
        <option value="Negative">Negative</option>
      </select>

      <button id="filterBtn">Apply Filter</button>
      <button id="refreshBtn" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
        Show All
      </button>
    </div>

    <div class="card">
      <h2>Your Journal Entries</h2>
      <div id="history" class="history-grid"></div>
    </div>

  </main>

  <footer>
    <div class="container">AniRealm &copy; 2024 — Anime Sentiment Journal</div>
  </footer>

  <script src="{{ url_for('static', filename='pages.js') }}"></script>
</body>
</html>
