<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Journal - AniRealm</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
 <nav class="navbar">
  <div class="nav-brand">AniRealm</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/journal">Journal</a>
    <a href="/history">History</a>
    <a href="/watchlist">Watchlist</a>
    <a href="/mood">Mood</a>
    <a href="/clash">Clash</a>
    <a href="/leaderboard">Leaderboard</a>
    <a href="/feed">Feed</a>
    <a href="/about">About</a>
    {% if current_user.is_authenticated %}
      <a href="/profile">Profile</a>
      <a href="/logout" class="nav-btn">Logout</a>
    {% else %}
      <a href="/login">Login</a>
      <a href="/signup" class="nav-btn">Sign Up</a>
    {% endif %}
  </div>
</nav>

  <main class="container page-space">

    <div class="card">
      <h2>Create Journal Entry</h2>

      <label for="anime_title">Anime Title</label>
      <input id="anime_title" type="text" placeholder="e.g. Attack on Titan" />

      <label for="episode">Episode Number</label>
      <input id="episode" type="number" min="1" value="1" />

      <label for="rating">Your Rating (1–5)</label>
      <input id="rating" type="number" min="1" max="5" value="5" />

      <label for="reflection_text">Your Reflection</label>
      <textarea id="reflection_text" rows="5"
        placeholder="Write how the episode made you feel..."></textarea>

      <label for="true_label">Expected Sentiment (True Label)</label>
      <select id="true_label">
        <option value="">Select your expected sentiment</option>
        <option value="Positive">Positive</option>
        <option value="Neutral">Neutral</option>
        <option value="Negative">Negative</option>
      </select>

      <button id="submitBtn">Analyse & Submit</button>
      <div id="result" class="message-box">Waiting for submission...</div>
    </div>

    <div class="card" id="predictionCard" style="display:none;">
      <h2>Sentiment Analysis Results</h2>
      <div id="comparisonResult" class="history-grid"></div>
      <div id="pointsEarned" style="margin-top:16px;"></div>
    </div>

  </main>

  <footer>
    <div class="container">AniRealm &copy; 2024 — Anime Sentiment Journal</div>
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
