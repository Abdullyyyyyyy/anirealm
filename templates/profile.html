<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile - AniRealm</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
  <div class="nav-brand">AniRealm</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/journal">Journal</a>
    <a href="/history">History</a>
    <a href="/watchlist">Watchlist</a>
    <a href="/mood">Mood</a>
    <a href="/clash">Clash</a>
    <a href="/leaderboard">Leaderboard</a>
    <a href="/feed">Feed</a>
    <a href="/about">About</a>
    {% if current_user.is_authenticated %}
      <a href="/profile">Profile</a>
      <a href="/logout" class="nav-btn">Logout</a>
    {% else %}
      <a href="/login">Login</a>
      <a href="/signup" class="nav-btn">Sign Up</a>
    {% endif %}
  </div>
</nav>

  <main class="container page-space">
    <div id="profileContent"></div>
  </main>

  <footer>
    <div class="container">
      AniRealm &copy; 2024 — Anime Sentiment Journal
    </div>
  </footer>

  <script>
    async function loadProfile() {
      const res = await fetch("/api/profile");
      const data = await res.json();

      const initials = data.username.slice(0, 2).toUpperCase();

      const trustClass = {
        "New User": "trust-new",
        "Regular Reviewer": "trust-regular",
        "Trusted Fan": "trust-fan",
        "Elite Recommender": "trust-elite"
      }[data.trust_level] || "trust-new";

      const maxPoints = 200;
      const pct = Math.min((data.loyalty_points / maxPoints) * 100, 100);

      document.getElementById("profileContent").innerHTML = `
        <div class="card">
          <div class="profile-header">
            <div class="avatar">${initials}</div>
            <div>
              <h2 style="margin-bottom:6px;">${data.username}</h2>
              <p style="color:#888; font-size:0.9rem;">${data.email}</p>
              <span class="trust-badge ${trustClass}" style="margin-top:8px; display:inline-block;">
                ${data.trust_level}
              </span>
            </div>
          </div>

          <div class="points-bar-container">
            <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
              <span style="font-weight:700; color:#764ba2;">Loyalty Points</span>
              <span style="font-weight:800; color:#764ba2;">${data.loyalty_points} pts</span>
            </div>
            <div class="points-bar-bg">
              <div class="points-bar-fill" style="width:${pct}%"></div>
            </div>
            <p style="font-size:0.8rem; color:#888; margin-top:6px;">
              Next level at 200 points — keep journaling!
            </p>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number">${data.loyalty_points}</div>
            <div class="stat-label">Loyalty Points</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${data.total_entries}</div>
            <div class="stat-label">Journal Entries</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${data.trust_level.split(" ")[0]}</div>
            <div class="stat-label">Trust Status</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${data.member_since}</div>
            <div class="stat-label">Member Since</div>
          </div>
        </div>

        <div class="card">
          <h2>Trust Level Guide</h2>
          <div class="features-grid">
            <div class="feature-card">
              <div class="feature-icon">🌱</div>
              <h3>New User</h3>
              <p>0 – 49 points</p>
            </div>
            <div class="feature-card">
              <div class="feature-icon">⭐</div>
              <h3>Regular Reviewer</h3>
              <p>50 – 99 points</p>
            </div>
            <div class="feature-card">
              <div class="feature-icon">💫</div>
              <h3>Trusted Fan</h3>
              <p>100 – 199 points</p>
            </div>
            <div class="feature-card">
              <div class="feature-icon">👑</div>
              <h3>Elite Recommender</h3>
              <p>200+ points</p>
            </div>
          </div>
        </div>
      `;
    }

    loadProfile();
  </script>
</body>
</html>
